name: Смонтировать видео (субтитры + чистка)

# Умный видеоредактор Sorokina ST.
# Берёт твоё видео с Google Drive → распознаёт речь → убирает слова-паразиты
# и длинные паузы → накладывает фирменные субтитры (акцентное слово, хуки, zoom).
# Запуск вручную: Actions → «Смонтировать видео (субтитры + чистка)» → Run workflow.
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Ссылка на ПУБЛИЧНЫЙ файл видео на Google Drive"
        type: string
        required: true
      format:
        description: "Куда монтируем"
        type: choice
        default: reels
        options:
          - reels
          - stories
      whisper_model:
        description: "Модель распознавания (medium точнее, но медленнее)"
        type: choice
        default: small
        options:
          - small
          - medium
      enhance:
        description: "Улучшать картинку (шумодав, цвет, мягкость, резкость глаз)"
        type: choice
        default: "yes"
        options:
          - "yes"
          - "no"

permissions:
  contents: write

jobs:
  edit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reels-builder
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: reels-builder/package-lock.json

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Поставить ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Поставить распознавание речи (Whisper) и gdown
        run: |
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet --upgrade openai-whisper gdown

      - name: Установить зависимости
        run: npm ci

      - name: Подготовить браузер для рендера
        run: npx remotion browser ensure

      - name: Скачать видео с Google Drive
        run: |
          mkdir -p public/edit
          # Достаём file id из любой формы ссылки (/file/d/ID/, uc?id=ID, id=ID)
          FILEID=$(printf '%s' "${{ inputs.video_url }}" | grep -oE '[-_A-Za-z0-9]{25,}' | head -1)
          echo "Drive file id: $FILEID"
          gdown "$FILEID" -O public/edit/input.mp4
          ls -lh public/edit/input.mp4

      - name: Распознать речь (словные таймкоды)
        run: |
          whisper public/edit/input.mp4 \
            --model "${{ inputs.whisper_model }}" \
            --language Russian \
            --word_timestamps True \
            --output_format json \
            --output_dir public/edit \
            --fp16 False

      - name: Собрать план монтажа (чистка + субтитры)
        run: |
          node scripts/edit-plan.mjs \
            public/edit/input.json \
            edit/cleaned.mp4 \
            "${{ inputs.format }}" \
            public/edit

      - name: Вырезать паузы и паразитов
        run: |
          if [ -s public/edit/filter.txt ]; then
            ffmpeg -y -i public/edit/input.mp4 \
              -filter_complex_script public/edit/filter.txt \
              -map "[outv]" -map "[outa]" \
              -r 30 -pix_fmt yuv420p -movflags +faststart \
              public/edit/cut.mp4
          else
            echo "Речь не распознана — беру видео как есть."
            ffmpeg -y -i public/edit/input.mp4 -r 30 -pix_fmt yuv420p public/edit/cut.mp4
          fi

      - name: Улучшить картинку (естественно, без пластика)
        run: |
          if [ "${{ inputs.enhance }}" = "yes" ]; then
            # Шумодав + мягкий грейд кожи + лёгкое смягчение (softlight 15%) +
            # аккуратная резкость для глаз. Без пластика — эффект деликатный.
            ffmpeg -y -i public/edit/cut.mp4 -filter_complex \
              "[0:v]hqdn3d=1.5:1.5:6:6,eq=contrast=1.06:saturation=1.06:gamma=1.03:brightness=0.012[base];[base]split[s1][s2];[s2]gblur=sigma=7[soft];[s1][soft]blend=all_mode=softlight:all_opacity=0.15,unsharp=5:5:0.6:5:5:0.0[outv]" \
              -map "[outv]" -map 0:a -c:a copy \
              -r 30 -pix_fmt yuv420p -movflags +faststart \
              public/edit/cleaned.mp4
          else
            cp public/edit/cut.mp4 public/edit/cleaned.mp4
          fi

      - name: Уточнить длительность очищенного видео
        run: |
          DUR=$(ffprobe -v error -show_entries format=duration -of csv=p=0 public/edit/cleaned.mp4)
          node -e "const fs=require('fs');const f='public/edit/subs.json';const j=JSON.parse(fs.readFileSync(f,'utf8'));const d=parseFloat(process.argv[1]);if(d>0)j.durationInSeconds=d;fs.writeFileSync(f,JSON.stringify(j,null,2));console.log('Длительность ролика:',j.durationInSeconds,'сек, блоков субтитров:',j.subs.length)" "$DUR"

      - name: Наложить фирменные субтитры (Remotion)
        run: |
          mkdir -p out
          npx remotion render src/index.ts Subtitle-Edit \
            --props=./public/edit/subs.json \
            --output out/edited.mp4 --log=error

      - name: Сохранить как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: edited-${{ inputs.format }}-${{ github.run_number }}
          path: reels-builder/out/edited.mp4
          retention-days: 30

      - name: Опубликовать для скачивания
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="edit-${{ github.run_number }}"
          cp out/edited.mp4 "out/edited-${{ inputs.format }}.mp4"
          cp public/edit/input.mp4 "out/original.mp4"
          # Что система сделала автоматически — из report.json
          report=$(cat public/edit/report.json 2>/dev/null || echo '{}')
          fillers=$(echo "$report" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).removedFillers)}catch(e){console.log('?')}})")
          pauses=$(echo "$report" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).pausesCut)}catch(e){console.log('?')}})")
          blocks=$(echo "$report" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).subtitleBlocks)}catch(e){console.log('?')}})")
          hooks=$(echo "$report" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).hookMoments)}catch(e){console.log('?')}})")
          dur=$(echo "$report" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).cleanedDuration)}catch(e){console.log('?')}})")
          notes=$(printf 'Готовый ролик + оригинал для сравнения.\n\nЧто система сделала автоматически:\n- убрала слов-паразитов: %s\n- вырезала пауз: %s\n- субтитров-блоков: %s (акцентное слово фирменным цветом)\n- эмоциональных хуков (zoom+замедление): %s\n- улучшила картинку: шумодав, цвет кожи, мягкость, резкость глаз\n- итоговая длительность: %s сек' "$fillers" "$pauses" "$blocks" "$hooks" "$dur")
          gh release create "$tag" \
            --title "Монтаж #${{ github.run_number }} · ${{ inputs.format }}" \
            --notes "$notes" \
            "out/edited-${{ inputs.format }}.mp4" "out/original.mp4"
          url=$(gh release view "$tag" --json assets --jq '.assets[] | select(.name|startswith("edited")) | .url')
          {
            echo "### 🎬 Видео смонтировано"
            echo ""
            echo "**[⬇️ Скачать MP4]($url)**"
            echo ""
            echo "$notes"
          } >> "$GITHUB_STEP_SUMMARY"
